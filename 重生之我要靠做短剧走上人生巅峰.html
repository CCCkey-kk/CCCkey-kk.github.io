<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>🎞️ 重生之我要靠做短剧走上人生巅峰</title>
    <style>
        /* ============================================================
                   胶片电影美学 · 黑紫/黑灰质感 + 胶卷边框
                   ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0812;
            --bg-card: rgba(14, 10, 28, 0.88);
            --film-black: #0b0915;
            --film-purple: #2a1f3d;
            --film-orange: #c05a2b;
            --film-red: #a8322a;
            --film-blue: #2f5a8a;
            --gold: #e8b84b;
            --gold-glow: #e8b84b33;
            --text-primary: #f0ece4;
            --text-secondary: #b8b0a4;
            --text-muted: #6a6270;
            --border-film: linear-gradient(135deg, #3a2a4a, #a8322a, #c05a2b, #2f5a8a, #3a2a4a);
            --shadow-film: 0 0 40px rgba(168, 50, 42, 0.08);
            --radius-film: 24px 6px 24px 6px;
            --transition: 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
            --inner-bg: rgba(255, 255, 255, 0.025);
            --border-width: 15px;
            --inner-offset: 18px;
        }

        html,
        body {
            height: 100%;
            font-family: var(--font);
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow: hidden;
        }

        /* ===== 胶片纹理背景 ===== */
        .bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background:
                radial-gradient(ellipse at 30% 40%, rgba(42, 31, 61, 0.6) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 60%, rgba(47, 90, 138, 0.25) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(192, 90, 43, 0.15) 0%, transparent 40%),
                var(--bg-primary);
            overflow: hidden;
        }
        .bg-canvas::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255, 255, 255, 0.012) 2px, rgba(255, 255, 255, 0.012) 4px),
                repeating-linear-gradient(90deg, transparent, transparent 3px, rgba(255, 255, 255, 0.008) 3px, rgba(255, 255, 255, 0.008) 6px);
            pointer-events: none;
        }

        /* ===== 主容器 ===== */
        #app {
            position: relative;
            z-index: 1;
            width: 100%;
            height: 100%;
            max-width: 720px;
            margin: 0 auto;
            padding: 10px 14px 14px 14px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ===== 胶卷边框容器 ===== */
        .film-frame-wrapper {
            position: relative;
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-radius: var(--radius-film);
        }

        .film-frame {
            position: relative;
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            background: var(--bg-card);
            border: var(--border-width) solid transparent;
            border-image: var(--border-film) 1;
            border-radius: 0;
            box-shadow: var(--shadow-film), inset 0 0 60px rgba(0, 0, 0, 0.4);
            padding: 12px 14px 12px 14px;
            overflow: hidden;
            transition: border-image 0.3s, box-shadow 0.3s;
        }

        /* 齿孔 */
        .film-frame .sprocket-holes {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 3;
            overflow: hidden;
            border-radius: 0;
        }
        .film-frame .sprocket-holes .hole-strip {
            position: absolute;
            left: 0;
            right: 0;
            height: calc(var(--border-width) - 2px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2px;
            gap: 0;
            overflow: hidden;
        }
        .film-frame .sprocket-holes .hole-strip-top { top: 2px; }
        .film-frame .sprocket-holes .hole-strip-bottom { bottom: 2px; }
        .film-frame .sprocket-holes .hole {
            flex-shrink: 0;
            width: 12px;
            height: 100%;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 1px;
            box-shadow: inset 0 0 4px rgba(0,0,0,0.3);
            position: relative;
        }
        .film-frame .sprocket-holes .hole::after {
            content: '';
            position: absolute;
            top: 1px;
            left: 1px;
            right: 1px;
            bottom: 1px;
            background: var(--bg-primary);
            border-radius: 1px;
            opacity: 0.85;
        }
        .film-frame .sprocket-holes .hole-strip {
            background: rgba(0,0,0,0.3);
            border-top: 1px solid rgba(255,255,255,0.06);
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .film-frame .sprocket-holes .hole-strip-bottom {
            border-top: 1px solid rgba(255,255,255,0.06);
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        /* 内层背景 */
        .film-frame .inner-bg {
            position: absolute;
            top: calc(var(--border-width) + var(--inner-offset));
            left: calc(var(--border-width) + var(--inner-offset));
            right: calc(var(--border-width) + var(--inner-offset));
            bottom: calc(var(--border-width) + var(--inner-offset));
            background: var(--inner-bg);
            border-radius: 6px;
            pointer-events: none;
            z-index: 0;
            border: 1px solid rgba(255,255,255,0.03);
            box-shadow: inset 0 0 60px rgba(255,255,255,0.008);
        }

        /* 滑动彩色条 */
        .film-frame .film-top,
        .film-frame .film-bottom {
            position: absolute;
            left: 0;
            right: 0;
            height: 6px;
            pointer-events: none;
            z-index: 4;
            overflow: hidden;
            border-radius: 2px;
        }
        .film-frame .film-top { top: calc(var(--border-width) + 1px); }
        .film-frame .film-bottom { bottom: calc(var(--border-width) + 1px); }
        .film-frame .film-slider {
            position: absolute;
            top: 0;
            left: 0;
            width: 200%;
            height: 100%;
            display: flex;
            flex-direction: column;
            transform: translateX(0%);
            transition: transform 0.01s linear;
        }
        .film-frame .film-slider .color-strip {
            width: 100%;
            height: 100%;
            flex-shrink: 0;
            background: repeating-linear-gradient(90deg,
                    rgba(168,50,42,0.4) 0px, rgba(168,50,42,0.4) 4px,
                    rgba(192,90,43,0.4) 4px, rgba(192,90,43,0.4) 8px,
                    rgba(47,90,138,0.4) 8px, rgba(47,90,138,0.4) 12px,
                    rgba(42,31,61,0.4) 12px, rgba(42,31,61,0.4) 16px);
            border-radius: 2px;
        }
        .film-frame .film-slider-bottom .color-strip {
            background: repeating-linear-gradient(90deg,
                    rgba(42,31,61,0.4) 0px, rgba(42,31,61,0.4) 4px,
                    rgba(47,90,138,0.4) 4px, rgba(47,90,138,0.4) 8px,
                    rgba(192,90,43,0.4) 8px, rgba(192,90,43,0.4) 12px,
                    rgba(168,50,42,0.4) 12px, rgba(168,50,42,0.4) 16px);
        }
        .film-frame.slide .film-slider {
            animation: filmSlide 0.6s ease-in-out forwards;
        }
        @keyframes filmSlide {
            0% { transform: translateX(0%); }
            100% { transform: translateX(-50%); }
        }

        /* 内容区 */
        .film-frame .card-scroll {
            position: relative;
            z-index: 1;
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 4px 2px;
            min-height: 0;
            max-height: 100%;
            width: 100%;
            justify-content: center;
        }
        .film-frame .card-scroll.ending-scroll {
            justify-content: flex-start;
        }

        .card-scroll::-webkit-scrollbar { width: 3px; }
        .card-scroll::-webkit-scrollbar-track { background: transparent; }
        .card-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }

        /* ===== 状态栏 ===== */
        .status-bar {
            flex-shrink: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 16px;
            margin-bottom: 10px;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 30px 6px 30px 6px;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            gap: 6px;
            flex-wrap: wrap;
        }
        .status-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.3px;
            padding: 3px 12px;
            border-radius: 30px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.04);
        }
        .status-item .icon { font-size: 1rem; }
        .status-item .label {
            color: var(--text-muted);
            font-weight: 400;
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .status-item .value {
            font-size: 1.05rem;
            font-weight: 700;
            min-width: 2rem;
            text-align: center;
        }
        .status-item .value.money { color: var(--gold); }
        .status-item .value.influence { color: #7abfff; }

        /* ===== 进度条 ===== */
        .progress-wrap {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            padding: 0 2px;
        }
        .progress-track {
            flex: 1;
            height: 4px;
            background: rgba(255,255,255,0.06);
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            border-radius: 4px;
            background: linear-gradient(90deg, var(--film-orange), var(--gold), var(--film-red));
            transition: width 0.6s ease;
            box-shadow: 0 0 12px rgba(232,184,75,0.15);
        }

        /* ===== 内容样式 ===== */
        .narrative {
            flex-shrink: 0;
            text-align: center;
            padding: 0 4px;
        }
        .narrative .phase-title {
            font-size: 1.15rem;
            font-weight: 800;
            color: var(--gold);
            letter-spacing: 0.5px;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .narrative .phase-desc {
            font-size: 0.9rem;
            line-height: 1.6;
            color: var(--text-secondary);
            margin-top: 2px;
            max-width: 520px;
            margin-left: auto;
            margin-right: auto;
            word-break: break-word;
        }
        .narrative .phase-desc strong { color: var(--text-primary); }

        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex-shrink: 0;
            padding-bottom: 4px;
            margin-top: 16px;
            max-width: 520px;
            margin-left: auto;
            margin-right: auto;
            width: 100%;
        }
        .option-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 14px 20px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 20px 4px 20px 4px;
            cursor: pointer;
            transition: all var(--transition);
            text-align: left;
            color: var(--text-primary);
            font-size: 0.9rem;
            font-weight: 500;
            line-height: 1.3;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            position: relative;
            min-height: 50px;
            backdrop-filter: blur(4px);
            box-shadow: 0 2px 12px rgba(0,0,0,0.2);
        }
        .option-btn:active { transform: scale(0.97); }
        .option-btn:hover {
            background: rgba(255,255,255,0.07);
            border-color: rgba(232,184,75,0.3);
            box-shadow: 0 0 30px rgba(232,184,75,0.04);
        }
        .option-btn .opt-label { flex: 1; font-weight: 500; }
        .option-btn .opt-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .option-btn .opt-meta .cost { color: #ff6b5a; }
        .option-btn .opt-meta .gain { color: #5cdb8a; }
        .option-btn .opt-meta .cost.gold { color: var(--gold); }
        .option-btn .opt-icon { font-size: 1.2rem; flex-shrink: 0; }
        .option-btn.selected {
            border-color: var(--gold);
            background: rgba(232,184,75,0.08);
            box-shadow: 0 0 30px rgba(232,184,75,0.06), inset 0 0 30px rgba(232,184,75,0.02);
        }
        .option-btn .opt-hint {
            font-size: 0.55rem;
            color: var(--text-muted);
            background: rgba(255,255,255,0.04);
            padding: 2px 10px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.04);
            margin-left: 4px;
            white-space: nowrap;
        }
        .options .option-divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.04), transparent);
            margin: 2px 0;
        }

        /* ===== 欢迎/起名页 ===== */
        .start-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            gap: 16px;
            padding: 8px 0;
            position: relative;
            z-index: 1;
            width: 100%;
        }
        .start-screen .logo {
            font-size: 3.6rem;
            line-height: 1;
            margin-bottom: 2px;
            animation: float 3s ease-in-out infinite;
            filter: drop-shadow(0 0 30px rgba(232,184,75,0.15));
        }
        @keyframes float {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }
        .start-screen h1 {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--gold), var(--film-orange));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 1px;
        }
        .start-screen .sub {
            font-size: 0.95rem;
            color: var(--text-secondary);
            max-width: 420px;
            line-height: 1.7;
        }
        .start-screen .sub strong { color: var(--text-primary); -webkit-text-fill-color: var(--text-primary); }
        .start-screen .guide-box {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 16px 4px 16px 4px;
            padding: 16px 24px;
            margin-top: 4px;
            max-width: 400px;
            backdrop-filter: blur(4px);
        }
        .start-screen .guide-box .key { color: var(--gold); font-weight: 600; }

        .name-input-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            width: 100%;
            max-width: 380px;
            margin-top: 4px;
        }
        .name-input-wrap .input-group {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 30px 6px 30px 6px;
            padding: 4px 4px 4px 18px;
            transition: border-color 0.3s;
        }
        .name-input-wrap .input-group:focus-within {
            border-color: var(--gold);
            box-shadow: 0 0 30px rgba(232,184,75,0.06);
        }
        .name-input-wrap .input-group input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-primary);
            font-size: 1.1rem;
            font-weight: 500;
            padding: 12px 0;
            min-width: 0;
            font-family: var(--font);
        }
        .name-input-wrap .input-group input::placeholder {
            color: var(--text-muted);
            font-weight: 400;
            font-size: 0.95rem;
        }
        .name-input-wrap .input-group .char-count {
            font-size: 0.65rem;
            color: var(--text-muted);
            padding-right: 12px;
            flex-shrink: 0;
        }
        .name-input-wrap .input-group .char-count.over { color: #ff6b5a; }
        .company-name-display {
            font-size: 1.1rem;
            color: var(--gold);
            font-weight: 600;
            margin-top: 4px;
            letter-spacing: 1px;
            min-height: 2rem;
            padding: 4px 16px;
            background: rgba(232,184,75,0.06);
            border-radius: 30px;
            border: 1px solid rgba(232,184,75,0.1);
        }
        .btn-primary {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 40px;
            background: linear-gradient(135deg, var(--gold), var(--film-orange));
            color: #0b0915;
            font-weight: 700;
            font-size: 1rem;
            border: none;
            border-radius: 40px 6px 40px 6px;
            cursor: pointer;
            transition: all var(--transition);
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            box-shadow: 0 4px 30px rgba(232,184,75,0.15);
            font-family: var(--font);
        }
        .btn-primary:active { transform: scale(0.95); }
        .btn-primary:hover {
            box-shadow: 0 6px 40px rgba(232,184,75,0.25);
            transform: translateY(-2px);
        }
        .btn-primary:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            pointer-events: none;
        }

        /* ================================================================
           结局页 - 可滚动，从顶部开始排列
           ================================================================ */
        .ending-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 21px 19px 28px 19px;
            overflow-y: auto;
            position: relative;
            z-index: 1;
            min-height: 0;
            max-height: 100%;
            width: 100%;
            box-sizing: border-box;
            max-width: calc(100% - 0px);
            margin: 0 auto;
            justify-content: flex-start;
        }

        .ending-screen * {
            max-width: 100%;
            word-wrap: break-word;
            overflow-wrap: break-word;
            box-sizing: border-box;
        }

        .ending-screen .ending-badge { text-align: center; font-size: 2.4rem; margin-bottom: 0px; flex-shrink: 0; }
        .ending-screen .ending-title {
            font-size: 1.5rem;
            font-weight: 800;
            text-align: center;
            line-height: 1.3;
            flex-shrink: 0;
        }
        .ending-screen .ending-title.gold { color: var(--gold); }
        .ending-screen .ending-title.red { color: #ff6b5a; }
        .ending-screen .ending-title.orange { color: var(--film-orange); }
        .ending-screen .ending-title.gray { color: var(--text-muted); }
        .ending-screen .ending-desc {
            font-size: 0.9rem;
            color: var(--text-secondary);
            line-height: 1.7;
            text-align: center;
            max-width: 480px;
            margin: 0 auto;
            padding: 0 4px;
            flex-shrink: 0;
        }
        .ending-screen .ending-desc .highlight { color: var(--gold); font-weight: 600; }

        /* --- 不可展开的卡片 (成就) --- */
        .ending-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 16px 4px 16px 4px;
            padding: 12px 16px;
            margin: 2px 0;
            backdrop-filter: blur(4px);
            width: 100%;
            box-sizing: border-box;
            overflow: hidden;
            flex-shrink: 0;
        }
        .ending-card-header {
            font-size: 1rem;
            font-weight: 700;
            color: var(--gold);
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .ending-card-body {
            font-size: 0.85rem;
            color: var(--text-secondary);
            line-height: 1.6;
            word-break: break-word;
        }

        /* --- 可展开卡片 (剧情简介、市场反响、政府信息) --- */
        .expandable-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 16px 4px 16px 4px;
            padding: 12px 16px;
            margin: 2px 0 4px 0;
            cursor: pointer;
            transition: all var(--transition);
            backdrop-filter: blur(4px);
            width: 100%;
            box-sizing: border-box;
            flex-shrink: 0;
        }
        .expandable-card:hover {
            background: rgba(255,255,255,0.05);
            border-color: rgba(255,255,255,0.10);
        }
        .expandable-card .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }
        .expandable-card .card-header .title {
            font-size: 1rem;
            font-weight: 700;
            color: var(--gold);
        }
        .expandable-card .card-header .toggle {
            font-size: 0.7rem;
            color: var(--text-muted);
            background: rgba(255,255,255,0.05);
            padding: 2px 14px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.06);
            transition: all var(--transition);
            user-select: none;
            flex-shrink: 0;
        }
        .expandable-card .card-header .toggle:hover {
            background: rgba(255,255,255,0.10);
            color: var(--text-primary);
        }
        .expandable-card .card-body {
            font-size: 0.85rem;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid rgba(255,255,255,0.05);
            display: none;
            word-break: break-word;
        }
        .expandable-card .card-body.open { display: block; }

                govContent: '截至去年，浙江省微短剧平台出海收入超4亿美元，越来越多的人选择投身到短剧出海的行业中来。但由于文化差异、行业鸿沟等问题，许多盲目入坑短剧出海行业的人最后大败而归。<br>中文在线后续将资源向新平台FlareFlow转移，但整体海外短剧业务仍处巨额亏损，2025年公司归母净利润预亏5.8亿——7亿元，亏损主因正是海外短剧的高额推广投入。<br>此外，合规问题和文化差异也是许多短剧出海失败的重要原因。2026年5月，8名中国短剧从业者在泰国清迈被捕，成为短剧出海合规风险的标志性事件。该团队持旅游签证入境，未办理工作许可与拍摄审批，租用民宅私自搭建片场进行商业拍摄，被泰国旅游警察当场查获。大量国内短剧团队曾扎堆赴美做本土拍摄，试图突破华人圈层，但多数以亏损撤场告终。国内短剧常见的壁咚、掌掴、下跪，乃至极端狗血剧情，遭到美国演员普遍抵触，大量桥段无法落地拍摄。<br>为了解决这些问题，为更多的短剧出海提供保障，浙江省微短剧出海综合服务平台于今年6月落户钱塘，整合政府部门、行业协会、金融机构、律所智库、高校院所等多元资源，打造一站式出海服务体系，为短剧出海保驾护航。'
            },
            flop: {
                badge: '🌊',
                title: '没有激起任何水花',
                titleClass: 'gray',
                desc: '经过你的努力最终也作出了一部看起来像模像样的短剧，但因为种种原因最终在海外反向平平，收入也仅仅是够温饱而已。为了赚钱你又匆匆投入到了下一步短剧的制作中来。',
                achievement: '莫比乌斯',
                govTitle: '📊 短剧出海现状',
                govContent: '2025年全年预计出海短剧5500部，但每10部出海短剧里，仅有1-2部能实现盈亏平衡或盈利，剩下8-9部都会在市场中被淹没，无法收回成本。以YouTube渠道为例，26.8%的频道已停更超过6个月，对应内容团队彻底退出市场，旗下所有短剧内容停止运营；91%的频道属于低流量，单条视频平均播放量不足万次，几乎没有付费转化与广告变现能力，内容上线后即石沉大海。'
            }
        };

        // ================================================================
        //  游戏状态
        // ================================================================

        let state = {
            phase: 'welcome',
            currentQuestion: null,
            money: 100,
            influence: 0,
            choices: {},
            companyName: '',
            path: null,
            isEnding: false,
            expandOpen: {},
            q7_choice: null
        };

        // ================================================================
        //  DOM REFS
        // ================================================================

        const $ = id => document.getElementById(id);
        const moneyDisplay = $('moneyDisplay');
        const influenceDisplay = $('influenceDisplay');
        const phaseLabel = $('phaseLabel');
        const progressFill = $('progressFill');
        const gameContent = $('gameContent');
        const cardScroll = $('cardScroll');
        const filmFrame = $('filmFrame');
        const filmSliderTop = $('filmSliderTop');
        const filmSliderBottom = $('filmSliderBottom');

        // ================================================================
        //  边框动画
        // ================================================================

        function triggerSlide() {
            filmSliderTop.style.animation = 'none';
            filmSliderBottom.style.animation = 'none';
            void filmSliderTop.offsetWidth;
            filmSliderTop.style.animation = 'filmSlide 0.6s ease-in-out forwards';
            filmSliderBottom.style.animation = 'filmSlide 0.6s ease-in-out forwards';
            setTimeout(() => {
                filmSliderTop.style.animation = '';
                filmSliderBottom.style.animation = '';
            }, 650);
        }

        // ================================================================
        //  更新状态栏和进度条
        // ================================================================

        function updateUI() {
            moneyDisplay.textContent = state.money;
            influenceDisplay.textContent = state.influence;

            let progress = 0;
            if (state.phase === 'welcome') {
                progress = 0;
                phaseLabel.textContent = '欢迎';
            } else if (state.phase === 'q_name') {
                progress = 3;
                phaseLabel.textContent = '起名';
            } else if (state.phase === 'question' && state.currentQuestion) {
                const q = QUESTIONS[state.currentQuestion];
                progress = q.progress || 50;
                const labels = {
                    'q2': '选题材', 'q3': '剧本选择', 'q4': '剧本改编',
                    'q5': '制作方式', 'q6': '发布渠道', 'q7': '最终决策',
                    'q8': '剧本改编', 'q9': '演员选择', 'q10': '后期制作',
                    'q11': '发布渠道', 'q12': '最终决策',
                    'q13': '剧本修改', 'q14': '演员选择',
                    'q15': '拍摄制作', 'q16': '发布渠道', 'q17': '最终决策',
                    'q18': '拍摄制作', 'q19': '发布渠道', 'q20': '最终决策',
                    'q21': '发布渠道', 'q22': '最终决策'
                };
                phaseLabel.textContent = labels[state.currentQuestion] || '决策';
            } else if (state.phase === 'ending') {
                progress = 100;
                phaseLabel.textContent = '结局';
            }
            progressFill.style.width = Math.min(progress, 100) + '%';
        }

        // ================================================================
        //  渲染函数
        // ================================================================

        function render() {
            updateUI();

            if (state.phase === 'ending') {
                cardScroll.classList.add('ending-scroll');
            } else {
                cardScroll.classList.remove('ending-scroll');
            }

            if (state.phase === 'welcome') renderWelcome();
            else if (state.phase === 'q_name') renderNameStage();
            else if (state.phase === 'question') renderQuestion();
            else if (state.phase === 'ending') renderEnding();

            if (state.phase !== 'ending') {
                cardScroll.scrollTop = 0;
            }
            setTimeout(generateHoles, 50);
        }

        // ---- 欢迎 ----
        function renderWelcome() {
            gameContent.innerHTML = `
                <div class="start-screen fade-in">
                    <div class="logo">🎞️</div>
                    <h1>重生之我要靠做短剧走上人生巅峰</h1>
                    <p class="sub">
                        你即将开启一段海外影视制作的冒险之旅。<br />
                        每一个决定都将影响作品的命运，请谨慎选择！
                    </p>
                    <div class="guide-box">
                        💡 <span class="key">资金</span> 决定生存，<span class="key">影响力</span> 决定成败。<br>
                        在有限的预算内，打造最具影响力的作品！
                    </div>
                    <button class="btn-primary" id="btnStart">🎬 开始制作</button>
                </div>
            `;
            $('btnStart')?.addEventListener('click', () => {
                state.phase = 'q_name';
                triggerSlide();
                render();
            });
        }

        // ---- 起名 ----
        function renderNameStage() {
            const currentName = state.companyName || '';
            gameContent.innerHTML = `
                <div class="start-screen fade-in">
                    <div class="logo">🏢</div>
                    <h1 style="font-size:1.4rem;">为公司起名</h1>
                    <p class="sub">你的影视公司需要一个响亮的名字，<br />它将伴随你征战海外市场！</p>
                    <div class="guide-box" style="padding:12px 20px;">
                        <div style="font-size:0.85rem;color:var(--text-secondary);margin-bottom:6px;">
                            你的公司名称：
                        </div>
                        <div class="company-name-display" id="nameDisplay">
                            ${currentName || '尚未命名'}
                        </div>
                    </div>
                    <div class="name-input-wrap">
                        <div class="input-group">
                            <input type="text" id="companyNameInput" 
                                   placeholder="输入公司名称（最多12字）" 
                                   maxlength="12"
                                   value="${currentName}"
                                   autofocus>
                            <span class="char-count" id="charCount">${currentName.length}/12</span>
                        </div>
                        <button class="btn-primary" id="btnConfirmName" ${currentName.length < 2 ? 'disabled' : ''}>
                            ✅ 确认命名
                        </button>
                        <div style="font-size:0.7rem;color:var(--text-muted);margin-top:4px;">
                            💡 至少输入2个字符
                        </div>
                    </div>
                </div>
            `;

            const input = document.getElementById('companyNameInput');
            const charCount = document.getElementById('charCount');
            const confirmBtn = document.getElementById('btnConfirmName');
            const nameDisplay = document.getElementById('nameDisplay');

            input.addEventListener('input', function() {
                const val = this.value.trim();
                const len = val.length;
                charCount.textContent = `${len}/12`;
                if (len > 10) charCount.classList.add('over');
                else charCount.classList.remove('over');
                if (nameDisplay) nameDisplay.textContent = val || '尚未命名';
                if (confirmBtn) confirmBtn.disabled = len < 2;
                state.companyName = val;
            });

            confirmBtn?.addEventListener('click', function() {
                const val = input.value.trim();
                if (val.length >= 2) {
                    state.companyName = val;
                    state.phase = 'question';
                    state.currentQuestion = 'q2';
                    triggerSlide();
                    render();
                }
            });

            input?.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    const val = this.value.trim();
                    if (val.length >= 2) {
                        state.companyName = val;
                        state.phase = 'question';
                        state.currentQuestion = 'q2';
                        triggerSlide();
                        render();
                    }
                }
            });

            setTimeout(() => { if (input) input.focus(); }, 100);
        }

        // ---- 渲染题目 ----
        function renderQuestion() {
            const q = QUESTIONS[state.currentQuestion];
            if (!q) return;

            const companyDisplay = state.companyName ?
                `<span style="color:var(--gold);font-weight:600;">「${state.companyName}」</span>` :
                '你的公司';

            let html = `
                <div class="narrative fade-in">
                    <div class="phase-title">${q.title}</div>
                    <div class="phase-desc">${q.desc.replace(/团队/g, companyDisplay + '团队')}</div>
                </div>
                <div class="options stagger">
            `;

            q.options.forEach((opt, idx) => {
                const costStr = opt.cost < 0 ? `-${Math.abs(opt.cost)}` : `${opt.cost}`;
                const infStr = opt.influence >= 0 ? `+${opt.influence}` : `${opt.influence}`;
                const costColor = opt.cost < 0 ? 'cost' : 'cost gold';
                html += `
                    <button class="option-btn" data-optidx="${idx}" style="animation-delay:${idx*0.05}s">
                        <span class="opt-icon">${['A','B','C','D'][idx] || '▸'}</span>
                        <span class="opt-label">${opt.label}</span>
                        <span class="opt-meta">
                            <span class="${costColor}">💰 ${costStr}</span>
                            <span class="gain">📈 ${infStr}</span>
                        </span>
                    </button>
                `;
                if (idx < q.options.length - 1) {
                    html += `<div class="option-divider"></div>`;
                }
            });

            html += `</div>`;
            gameContent.innerHTML = html;

            document.querySelectorAll('.option-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const idx = parseInt(this.dataset.optidx);
                    handleChoice(idx);
                });
            });
        }

        // ---- 处理选择 ----
        function handleChoice(optIdx) {
            const q = QUESTIONS[state.currentQuestion];
            if (!q || !q.options) return;
            const opt = q.options[optIdx];
            if (!opt) return;

            state.money += opt.cost;
            state.influence += opt.influence;

            if (state.money <= 0) {
                state.money = 0;
                state.phase = 'ending';
                state.isEnding = true;
                triggerSlide();
                render();
                return;
            }

            state.choices[state.currentQuestion] = optIdx;

            if (opt.next) {
                state.currentQuestion = opt.next;
                triggerSlide();
                render();
            } else {
                state.phase = 'ending';
                state.isEnding = true;
                if (q.path) state.path = q.path;
                if (q.id === 'q7' && opt.tag) {
                    state.q7_choice = opt.tag;
                }
                triggerSlide();
                render();
            }
        }

        // ---- 结局判定 ----
        function getEnding() {
            const m = state.money;
            const inf = state.influence;

            if (m <= 0) {
                return { key: 'bankrupt', data: ENDINGS.bankrupt };
            }

            if (inf < 80) {
                if (state.path === 'urban_script_c') {
                    return { key: 'urban_script_c_pending', data: ENDINGS.urban_script_c_pending };
                }
                return { key: 'flop', data: ENDINGS.flop };
            }

            switch (state.path) {
                case 'sci_fi':
                    if (state.q7_choice === 'art') {
                        return { key: 'sci_fi_success', data: ENDINGS.sci_fi_success };
                    } else {
                        return { key: 'sci_fi_almost', data: ENDINGS.sci_fi_almost };
                    }
                case 'urban_adapt':
                    return { key: 'urban_adapt_success', data: ENDINGS.urban_adapt_success };
                case 'urban_script_a':
                    return { key: 'urban_script_a_success', data: ENDINGS.urban_script_a_success };
                case 'urban_script_b':
                    return { key: 'urban_script_b_success', data: ENDINGS.urban_script_b_success };
                case 'urban_script_c':
                    return { key: 'urban_script_c_pending', data: ENDINGS.urban_script_c_pending };
                default:
                    return { key: 'flop', data: ENDINGS.flop };
            }
        }

        // ---- 构建可展开卡片 ----
        function buildExpandableCard(key, title, bodyContent, isOpen) {
            const openClass = isOpen ? 'open' : '';
            const toggleText = isOpen ? '收起 ▲' : '展开 ▼';
            return `
                <div class="expandable-card" data-key="${key}">
                    <div class="card-header">
                        <span class="title">${title}</span>
                        <span class="toggle">${toggleText}</span>
                    </div>
                    <div class="card-body ${openClass}">${bodyContent}</div>
                    <div class="click-hint">💡 点击展开/收起详情</div>
                </div>
            `;
        }

        // ---- 渲染结局 ----
        function renderEnding() {
            const result = getEnding();
            const end = result.data;
            const m = state.money;
            const inf = state.influence;
            const companyName = state.companyName || '你的公司';

            let desc = end.desc.replace(/你的公司/g, companyName);
            let title = end.title.replace(/你的公司/g, companyName);

            let html = `
                <div class="ending-screen fade-in">
                    <div class="ending-badge">${end.badge}</div>
                    <div class="ending-title ${end.titleClass || 'gold'}">${title}</div>
                    <div class="ending-desc">${desc}</div>
                    <div class="ending-stats">
                        <div class="stat"><div class="num gold">${m}</div><div class="lbl">剩余资金</div></div>
                        <div class="stat"><div class="num blue">${inf}</div><div class="lbl">影响力</div></div>
                    </div>
            `;

            if (end.achievement) {
                html += `
                    <div class="ending-card">
                        <div class="ending-card-header">🏅 成就：${end.achievement}</div>
                    </div>
                `;
            }

            if (end.story) {
                let storyContent = end.story;
                let tagsHtml = '';
                if (end.tags && end.tags.length > 0) {
                    tagsHtml = `<div class="tag-group">${end.tags.map(t => `<span class="tag">#${t}</span>`).join('')}</div>`;
                }
                if (end.poster) {
                    storyContent = end.poster + storyContent;
                }
                const finalContent = storyContent + tagsHtml;
                const isStoryOpen = state.expandOpen['story'] || false;
                html += buildExpandableCard('story', '📖 剧情简介', finalContent, isStoryOpen);
            }

            let marketContent = '';
            if (end.reactions) {
                marketContent += end.reactions;
                if (end.significance) {
                    marketContent += `<br><br><strong style="color:var(--gold);">行业意义：</strong>${end.significance}`;
                }
                if (end.region) {
                    marketContent += `<br><br><strong style="color:var(--gold);">传播区域：</strong>${end.region}`;
                }
            } else if (end.market) {
                marketContent += end.market;
                if (end.region) {
                    marketContent += `<br><br><strong style="color:var(--gold);">传播区域：</strong>${end.region}`;
                }
            }
            if (marketContent) {
                const isMarketOpen = state.expandOpen['market'] || false;
                html += buildExpandableCard('market', '📊 市场反响', marketContent, isMarketOpen);
            }

            if (end.govTitle && end.govContent) {
                const isGovOpen = state.expandOpen['gov'] || false;
                html += buildExpandableCard('gov', end.govTitle, end.govContent, isGovOpen);
            }

            html += `
                <button class="btn-restart" id="btnRestart">🔄 重新制作</button>
            `;
            html += `</div>`;

            gameContent.innerHTML = html;

            document.querySelectorAll('.expandable-card').forEach(card => {
                const key = card.dataset.key;
                const toggle = card.querySelector('.toggle');
                const body = card.querySelector('.card-body');
                if (!toggle || !body) return;

                const isOpen = state.expandOpen[key] || false;
                if (isOpen) {
                    body.classList.add('open');
                    toggle.textContent = '收起 ▲';
                }

                const toggleFn = (e) => {
                    state.expandOpen[key] = !state.expandOpen[key];
                    if (state.expandOpen[key]) {
                        body.classList.add('open');
                        toggle.textContent = '收起 ▲';
                    } else {
                        body.classList.remove('open');
                        toggle.textContent = '展开 ▼';
                    }
                };

                card.addEventListener('click', toggleFn);
                toggle.addEventListener('click', (e) => {
                    e.stopPropagation();
                    toggleFn(e);
                });
            });

            $('btnRestart')?.addEventListener('click', resetGame);

            setTimeout(() => {
                if (cardScroll) cardScroll.scrollTop = 0;
            }, 50);
        }

        // ---- 重置 ----
        function resetGame() {
            state = {
                phase: 'welcome',
                currentQuestion: null,
                money: 100,
                influence: 0,
                choices: {},
                companyName: '',
                path: null,
                isEnding: false,
                expandOpen: {},
                q7_choice: null
            };
            render();
        }

        // ================================================================
        //  启动
        // ================================================================

        generateHoles();
        render();

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && state.phase === 'welcome') {
                const btn = $('btnStart');
                if (btn) btn.click();
            }
            if (state.phase === 'question') {
                const idx = parseInt(e.key) - 1;
                if (idx >= 0) {
                    const btns = document.querySelectorAll('.option-btn');
                    if (btns[idx]) btns[idx].click();
                }
            }
        });

        console.log('🎞️ 游戏已加载，所有结局中的换行已替换为<br>');
    </script>

</body>
</html>
